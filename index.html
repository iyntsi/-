<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>脈アリ診断</title>
<style>
body {
  font-family: sans-serif;
  background: #ffeef5;
  text-align: center;
  padding: 20px;
}
#game {
  background: white;
  padding: 20px;
  border-radius: 15px;
  max-width: 500px;
  margin: auto;
}
button {
  margin: 10px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: #ff7aa2;
  color: white;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="game">
  <h2 id="question">スタート！</h2>
  <div id="choices"></div>
  <p id="result"></p>
</div>

<script>
let point = 0;
let step = 0;

const questions = [
  {
    q: "話しかけたときどうだった？",
    a: [
      { text: "😊 笑顔", p: 5 },
      { text: "🙂 普通", p: 3 },
      { text: "😐 無視", p: 1 }
    ]
  },
  {
    q: "LINEしたときは？",
    a: [
      { text: "💕 すぐ返信＆続く", p: 5 },
      { text: "🙂 普通に返信", p: 3 },
      { text: "😐 そっけない", p: 1 }
    ]
  },
  {
    q: "目が合ったときは？",
    a: [
      { text: "😊 笑った", p: 5 },
      { text: "🙂 少し見た", p: 3 },
      { text: "😐 そらされた", p: 1 }
    ]
  }
];

function showQuestion() {
  if (step >= questions.length) {
    showResult();
    return;
  }

  const q = questions[step];
  document.getElementById("question").innerText = q.q;

  let buttons = "";
  q.a.forEach(choice => {
    buttons += `<button onclick="select(${choice.p})">${choice.text}</button>`;
  });

  document.getElementById("choices").innerHTML = buttons;
}

function select(p) {
  point += p;
  step++;
  showQuestion();
}

function showResult() {
  let percent = Math.floor((point / 15) * 100);
  let text = "";

  if (percent >= 80) text = "💕 脈アリ確定！";
  else if (percent >= 60) text = "😊 いい感じ！";
  else if (percent >= 40) text = "😐 微妙…";
  else text = "💔 脈ナシかも";

  document.getElementById("question").innerText = "結果";
  document.getElementById("choices").innerHTML =
    "<button onclick='location.reload()'>もう一回</button>";
  document.getElementById("result").innerText =
    "脈アリ度: " + percent + "%\n" + text;
}

showQuestion();
</script>

</body>
</html>
