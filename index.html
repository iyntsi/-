<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>脈アリ診断ゲーム</title>
<style>
body {
  font-family: sans-serif;
  background: #ffeef5;
  text-align: center;
  padding: 20px;
}
#game {
  background: white;
  padding: 20px;
  border-radius: 15px;
  max-width: 500px;
  margin: auto;
}
button {
  margin: 10px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: #ff7aa2;
  color: white;
  cursor: pointer;
}
button:hover {
  background: #ff4d7a;
}
</style>
</head>
<body>

<div id="game">
  <h2 id="day">1日目</h2>
  <p id="text">どうする？</p>

  <div id="choices">
    <button onclick="action('talk')">😊 話しかける</button>
    <button onclick="action('line')">📱 LINEする</button>
    <button onclick="action('eye')">👀 目が合う</button>
  </div>

  <p id="status"></p>
</div>

<script>
let day = 1;
let point = 0;
let maxPoint = 25; // 最大想定

function updateStatus() {
  let percent = Math.floor((point / maxPoint) * 100);
  document.getElementById("status").innerHTML =
    "脈アリ度: " + percent + "%（ポイント: " + point + "）";
}

function action(type) {
  let rand = Math.random();
  let msg = "";
  let add = 0;

  if (type === "talk") {
    if (rand < 0.4) {
      msg = "笑顔で会話が続いた！😊（+5）";
      add = 5;
    } else if (rand < 0.8) {
      msg = "普通に会話できた🙂（+3）";
      add = 3;
    } else {
      msg = "そっけない反応だった😐（+1）";
      add = 1;
    }
  }

  if (type === "line") {
    if (rand < 0.4) {
      msg = "すぐ返信＋会話続いた！💕（+5）";
      add = 5;
    } else if (rand < 0.8) {
      msg = "普通に返信きた🙂（+3）";
      add = 3;
    } else {
      msg = "返信遅くて短い😐（+1）";
      add = 1;
    }
  }

  if (type === "eye") {
    if (rand < 0.4) {
      msg = "目が合って笑ってくれた！😊（+5）";
      add = 5;
    } else if (rand < 0.8) {
      msg = "少し目が合った🙂（+3）";
      add = 3;
    } else {
      msg = "すぐそらされた😐（+1）";
      add = 1;
    }
  }

  point += add;
  day++;

  document.getElementById("text").innerText = msg;
  updateStatus();

  if (day > 5) {
    ending();
  } else {
    document.getElementById("day").innerText = day + "日目";
  }
}

function ending() {
  let percent = Math.floor((point / maxPoint) * 100);
  let result = "";

  if (percent >= 80) {
    result = "💕 脈アリ確定！告白成功！";
  } else if (percent >= 60) {
    result = "😊 いい感じ！あと一歩！";
  } else if (percent >= 40) {
    result = "😐 まだ微妙…";
  } else {
    result = "💔 脈ナシかも…";
  }

  document.getElementById("text").innerText = result;
  document.getElementById("choices").innerHTML =
    "<button onclick='location.reload()'>もう一回</button>";
}

updateStatus();
</script>

</body>
</html>
