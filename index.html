<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>脈アリ診断 完全版</title>
<style>
body {
  font-family: "Arial";
  background: linear-gradient(#ffeef5, #ffd6e7);
  text-align: center;
  padding: 20px;
}
#game {
  background: white;
  padding: 20px;
  border-radius: 20px;
  max-width: 550px;
  margin: auto;
  box-shadow: 0 0 15px rgba(0,0,0,0.1);
}
button {
  margin: 8px;
  padding: 12px 18px;
  border-radius: 15px;
  border: none;
  background: #ff7aa2;
  color: white;
  cursor: pointer;
  font-size: 14px;
}
button:hover {
  background: #ff4d7a;
}
input {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}
</style>
</head>
<body>

<div id="game">
  <h2 id="title">💕 脈アリ診断 💕</h2>
  <div id="content"></div>
</div>

<script>
let name = "";
let point = 0;
let step = 0;
let selectedQuestions = [];

// 全質問（大量）
const allQuestions = [
  {q:"話しかけたときどうだった？", a:[
    {text:"😊 笑顔", p:5},{text:"🙂 普通", p:3},{text:"😐 無視", p:1},{text:"💔 避けられる", p:-3}]},

  {q:"LINEの返信は？", a:[
    {text:"💕 すぐ＆続く", p:5},{text:"🙂 普通", p:3},{text:"😐 遅い", p:1},{text:"💔 既読無視", p:-3}]},

  {q:"目が合ったとき", a:[
    {text:"😊 笑う", p:5},{text:"🙂 普通", p:3},{text:"😐 そらす", p:1},{text:"💔 避ける", p:-3}]},

  {q:"他の人と比べて", a:[
    {text:"✨ 特別扱い", p:5},{text:"🙂 少し違う", p:3},{text:"😐 同じ", p:1},{text:"💔 冷たい", p:-3}]},

  {q:"誘ったとき", a:[
    {text:"💕 喜んでOK", p:5},{text:"🙂 状況次第", p:3},{text:"😐 渋る", p:1},{text:"💔 断られる", p:-3}]},

  {q:"会話の深さ", a:[
    {text:"💬 プライベート話", p:5},{text:"🙂 普通", p:3},{text:"😐 表面だけ", p:1},{text:"💔 話さない", p:-3}]},

  {q:"困っているとき", a:[
    {text:"✨ 助けてくれる", p:5},{text:"🙂 普通", p:3},{text:"😐 無関心", p:1},{text:"💔 無視", p:-3}]},

  {q:"SNSの反応", a:[
    {text:"💕 よく反応", p:5},{text:"🙂 たまに", p:3},{text:"😐 少ない", p:1},{text:"💔 なし", p:-3}]},

  {q:"距離感", a:[
    {text:"💖 近い", p:5},{text:"🙂 普通", p:3},{text:"😐 遠い", p:1},{text:"💔 避ける", p:-3}]},

  {q:"帰り道", a:[
    {text:"💕 一緒に帰る", p:5},{text:"🙂 たまに", p:3},{text:"😐 別", p:1},{text:"💔 避ける", p:-3}]},

  {q:"名前の呼び方", a:[
    {text:"💖 名前呼び", p:5},{text:"🙂 苗字", p:3},{text:"😐 あまり呼ばない", p:1},{text:"💔 呼ばれない", p:-3}]},

  {q:"嫉妬", a:[
    {text:"🔥 気にしてる", p:5},{text:"🙂 少し", p:3},{text:"😐 無関心", p:1},{text:"💔 全くなし", p:-3}]},

  {q:"視線", a:[
    {text:"👀 よく見る", p:5},{text:"🙂 たまに", p:3},{text:"😐 少ない", p:1},{text:"💔 ない", p:-3}]},

  {q:"予定", a:[
    {text:"💕 合わせてくれる", p:5},{text:"🙂 普通", p:3},{text:"😐 合わせない", p:1},{text:"💔 拒否", p:-3}]}
];

// スタート画面
function startScreen() {
  document.getElementById("content").innerHTML = `
    <p>名前を入力してスタート！</p>
    <input id="nameInput" placeholder="名前">
    <br><br>
    <button onclick="startGame()">スタート</button>
  `;
}

// ゲーム開始
function startGame() {
  name = document.getElementById("nameInput").value || "あなた";
  selectedQuestions = shuffle(allQuestions).slice(0, 10);
  showQuestion();
}

// 質問表示
function showQuestion() {
  if (step >= selectedQuestions.length) {
    showResult();
    return;
  }

  let q = selectedQuestions[step];
  let html = `<h3>Q${step+1}. ${q.q}</h3>`;

  q.a.forEach(choice => {
    html += `<button onclick="select(${choice.p})">${choice.text}</button>`;
  });

  document.getElementById("content").innerHTML = html;
}

// 選択
function select(p) {
  point += p;
  step++;
  showQuestion();
}

// 結果
function showResult() {
  let max = selectedQuestions.length * 5;
  let percent = Math.floor((point / max) * 100);
  let text = "";

  if (percent >= 85) text = "💍 完全に両想いレベル";
  else if (percent >= 70) text = "💕 脈アリ！かなりいい感じ";
  else if (percent >= 55) text = "😊 いい感じ";
  else if (percent >= 40) text = "😐 まだ微妙";
  else text = "💔 ちょっと厳しいかも";

  document.getElementById("content").innerHTML = `
    <h2>${name}の結果</h2>
    <h3>脈アリ度 ${percent}%</h3>
    <p>${text}</p>
    <button onclick="location.reload()">もう一回</button>
  `;
}

// シャッフル
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

startScreen();
</script>

</body>
</html>
